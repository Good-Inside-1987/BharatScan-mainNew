kind = "web"
previewPath = "/"
title = "BharatScan"
version = "1.0.0"
id = "artifacts/bharatscan"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22167

[services.development]
run = "pnpm --filter @workspace/bharatscan run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bharatscan", "run", "build" ]
publicDir = "artifacts/bharatscan/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22167"
BASE_PATH = "/"
